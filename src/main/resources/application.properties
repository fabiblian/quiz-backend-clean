spring.application.name=Quiz Backend

# MultiUser Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5434/quiz_multiuser
spring.datasource.username=quiz_user
spring.datasource.password=quiz_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Settings for development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional: SQL Debugging
logging.level.org.hibernate.SQL=DEBUG

# Server Configuration
server.port=8080

# ========================================
# JWT Configuration
# ========================================
# Secret Key für JWT Signatur
# WICHTIG: In Production als Environment Variable!
# Mindestens 256 Bit (32 Zeichen) für HS256
jwt.secret=${JWT_SECRET:dev-secret-key-min-32-chars-change-in-prod}

# Token Gültigkeit in Millisekunden
# 86400000 ms = 24 Stunden = 60*60*24*1000
jwt.expiration=86400000

logging.level.org.springframework.beans=DEBUG
logging.level.org.springframework.context=DEBUG


